<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paris vs Monaco — Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS -->
    <script defer src="js/chart.js"></script>
    <script defer src="js/app.js"></script>
</head>

<body>

    <!-- ============================
         HEADER AVEC LOGOS
    ============================= -->
    <div class="header-logos">
        <img src="img/paris.png" class="team-logo">
        <h1>Paris vs Monaco — Dashboard</h1>
        <img src="img/monaco.png" class="team-logo">
    </div>

    <!-- ============================
         BOUTONS DE NAVIGATION (ONGLETS)
    ============================= -->
    <div class="nav-buttons">
        <button onclick="showSection('prob')">Probabilités</button>
        <button onclick="showSection('mc')">Monte-Carlo</button>
        <button onclick="showSection('h2h')">H2H</button>
        <button onclick="showSection('stats')">Stats</button>
        <button onclick="showSection('injuries')">Blessures</button>
    </div>

    <!-- ============================
         HEADER PROBABILITÉS
    ============================= -->
    <div class="header-prob">
        <div>
            <b>Paris</b><br>
            <span id="header-paris-prob">--%</span>
        </div>
        <div>
            <b>Monaco</b><br>
            <span id="header-monaco-prob">--%</span>
        </div>
    </div>


    <!-- ============================
         SECTION : PROBABILITÉS QT
    ============================= -->
    <div id="prob-section" class="section" data-section="prob">
        <h2>Évolution des probabilités</h2>

        <div id="before_match"></div>
        <div id="after_q1"></div>
        <div id="after_q2"></div>
        <div id="after_q3"></div>
        <div id="after_q4"></div>

        <canvas id="probChart"></canvas>
    </div>


    <!-- ============================
         SECTION : MONTE-CARLO H2H
    ============================= -->
    <div id="mc-section" class="section" data-section="mc">
        <h2>Monte-Carlo H2H</h2>

        <div id="mc-result"></div>
        <canvas id="mcChart"></canvas>
    </div>


    <!-- ============================
         SECTION : H2H GLOBAL
    ============================= -->
    <div id="h2h-section" class="section" data-section="h2h">
        <h2>Face-à-face (H2H)</h2>

        <div id="h2h-global"></div>
        <canvas id="h2hChart"></canvas>
    </div>


    <!-- ============================
         SECTION : STATS
    ============================= -->
    <div id="stats-section" class="section" data-section="stats">
        <h2>Stats — 5 derniers matchs</h2>

        <div id="stats-compare"></div>
        <canvas id="statsChart"></canvas>
    </div>


    <!-- ============================
         SECTION : BLESSURES
    ============================= -->
    <div id="injuries-section" class="section" data-section="injuries">
        <h2>Blessures</h2>

        <div id="injuries"></div>
    </div>


    <!-- ============================
         SCRIPT : GESTION DES ONGLETS
    ============================= -->
    <script>
        function showSection(name) {
            document.querySelectorAll(".section").forEach(sec => {
                sec.classList.remove("active");
            });

            document.querySelector(`[data-section="${name}"]`).classList.add("active");
        }

        // Section affichée par défaut
        showSection("prob");
    </script>

</body>
</html>
