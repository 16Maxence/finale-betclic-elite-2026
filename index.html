<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Paris vs Monaco — Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS -->
    <script defer src="js/chart.js"></script>
    <script defer src="js/app.js"></script>
</head>

<body>

    <!-- ============================
         HEADER AVEC LOGOS
    ============================= -->
    <div class="header-logos">
        <img src="img/paris.png" class="team-logo">
        <h1>Paris vs Monaco — Dashboard</h1>
        <img src="img/monaco.png" class="team-logo">
    </div>

    <!-- ============================
         BOUTONS DE NAVIGATION
    ============================= -->
    <div class="nav-buttons">
        <button onclick="scrollToSection('prob-section')">Probabilités</button>
        <button onclick="scrollToSection('mc-section')">Monte-Carlo</button>
        <button onclick="scrollToSection('h2h-section')">H2H</button>
        <button onclick="scrollToSection('stats-section')">Stats</button>
        <button onclick="scrollToSection('injuries-section')">Blessures</button>
    </div>

    <!-- ============================
         HEADER PROBABILITÉS
    ============================= -->
    <div class="header-prob">
        <div>
            <b>Paris</b><br>
            <span id="header-paris-prob">--%</span>
        </div>
        <div>
            <b>Monaco</b><br>
            <span id="header-monaco-prob">--%</span>
        </div>
    </div>


    <!-- ============================
         PROBABILITÉS QT
    ============================= -->
    <div id="prob-section" class="section">
        <h2>Évolution des probabilités</h2>

        <div id="before_match"></div>
        <div id="after_q1"></div>
        <div id="after_q2"></div>
        <div id="after_q3"></div>
        <div id="after_q4"></div>

        <canvas id="probChart"></canvas>
    </div>


    <!-- ============================
         MONTE-CARLO H2H
    ============================= -->
    <div id="mc-section" class="section">
        <h2>Monte-Carlo H2H</h2>

        <div id="mc-result"></div>
        <canvas id="mcChart"></canvas>
    </div>


    <!-- ============================
         H2H GLOBAL
    ============================= -->
    <div id="h2h-section" class="section">
        <h2>Face-à-face (H2H)</h2>

        <div id="h2h-global"></div>
        <canvas id="h2hChart"></canvas>
    </div>


    <!-- ============================
         STATS DES 5 DERNIERS MATCHS
    ============================= -->
    <div id="stats-section" class="section">
        <h2>Stats — 5 derniers matchs</h2>

        <div id="stats-compare"></div>
        <canvas id="statsChart"></canvas>
    </div>


    <!-- ============================
         BLESSURES
    ============================= -->
    <div id="injuries-section" class="section">
        <h2>Blessures</h2>

        <div id="injuries"></div>
    </div>


    <!-- ============================
         SCRIPT SCROLL
    ============================= -->
    <script>
        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: "smooth" });
        }
    </script>

</body>
</html>
