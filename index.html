<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Finale Betclic Elite 2026 (Match décisif) — Paris vs Monaco</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <img src="img/paris.png" class="team-logo">
        <h1>Paris vs Monaco — Dashboard</h1>
        <img src="img/monaco.png" class="team-logo">
    </header>

    <div class="header-prob">
        <div class="prob-box paris">Paris <span id="header-paris-prob"></span></div>
        <div class="prob-box monaco">Monaco <span id="header-monaco-prob"></span></div>
    </div>

    <div class="nav-buttons">
        <button onclick="showSection('prob')">Probabilités</button>
        <button onclick="showSection('mc')">Monte-Carlo</button>
        <button onclick="showSection('h2h')">H2H</button>
        <button onclick="showSection('stats')">Stats</button>
        <button onclick="showSection('inj')">Blessures</button>
    </div>

    <section class="section active" data-section="prob">

        <h2>Probabilités par quart-temps</h2>

        <div id="before_match"></div>
        <div id="after_q1"></div>
        <div id="after_q2"></div>
        <div id="after_q3"></div>
        <div id="after_q4"></div>

        <canvas id="probChart"></canvas>
    </section>

    <section class="section" data-section="mc">

        <h2>Monte-Carlo</h2>

        <div id="mc-result"></div>

        <h3>Répartition des victoires</h3>
        <canvas id="mcChart"></canvas>

        <h3>Histogramme</h3>
        <canvas id="mcDistChart"></canvas>

    </section>

    <section class="section" data-section="h2h">

        <h2>Face-à-face (H2H)</h2>

        <div id="h2h-global"></div>

        <h3>Derniers matchs</h3>
        <div id="h2h-table"></div>

        <h3>Historique des scores</h3>
        <canvas id="h2hHistoryChart"></canvas>

        <h3>Stats moyennes</h3>
        <canvas id="h2hAvgChart"></canvas>

        <h3>Profil comparatif</h3>
        <canvas id="h2hRadarChart"></canvas>

        <h3>Cumul des victoires</h3>
        <canvas id="h2hCumulativeChart"></canvas>

    </section>

    <section class="section" data-section="stats">

        <h2>Stats récentes</h2>

        <div id="stats-compare"></div>

        <canvas id="statsChart"></canvas>

    </section>

    <section class="section" data-section="inj">

        <h2>Blessures</h2>

        <div id="injuries"></div>

    </section>

    <script src="chart.js" defer></script>
    <script src="app.js" defer></script>

</body>
</html>
