<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Paris vs Monaco</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- JS -->
    <script defer src="js/chart.js"></script>
    <script defer src="js/app.js"></script>
</head>

<body>

    <h1>Paris vs Monaco — Dashboard</h1>

    <!-- ============================
         HEADER PROBABILITÉS
    ============================= -->
    <div class="header-prob">
        <div>
            <b>Paris</b><br>
            <span id="header-paris-prob">--%</span>
        </div>
        <div>
            <b>Monaco</b><br>
            <span id="header-monaco-prob">--%</span>
        </div>
    </div>


    <!-- ============================
         PROBABILITÉS QT
    ============================= -->
    <h2>Évolution des probabilités</h2>

    <div id="before_match"></div>
    <div id="after_q1"></div>
    <div id="after_q2"></div>
    <div id="after_q3"></div>
    <div id="after_q4"></div>

    <canvas id="probChart"></canvas>


    <!-- ============================
         MONTE-CARLO H2H
    ============================= -->
    <h2>Monte-Carlo H2H</h2>

    <div id="mc-result"></div>
    <canvas id="mcChart"></canvas>


    <!-- ============================
         H2H GLOBAL
    ============================= -->
    <h2>Face-à-face (H2H)</h2>

    <div id="h2h-global"></div>
    <canvas id="h2hChart"></canvas>


    <!-- ============================
         STATS DES 5 DERNIERS MATCHS
    ============================= -->
    <h2>Stats — 5 derniers matchs</h2>

    <div id="stats-compare"></div>
    <canvas id="statsChart"></canvas>


    <!-- ============================
         BLESSURES
    ============================= -->
    <h2>Blessures</h2>

    <div id="injuries"></div>

</body>
</html>
