<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paris vs Monaco — Finale Betclic Élite</title>

    <link rel="stylesheet" href="style.css">
    <script defer src="js/chart.js"></script>
    <script defer src="js/app.js"></script>
</head>

<body>

<header class="hero-header">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <div class="team-logos">
            <img src="https://upload.wikimedia.org/wikipedia/fr/thumb/0/0c/Paris_Basketball_logo_2022.png/200px-Paris_Basketball_logo_2022.png" class="team-logo">
            <span class="vs">VS</span>
            <img src="https://upload.wikimedia.org/wikipedia/fr/thumb/4/4a/AS_Monaco_Basket_Logo.svg/200px-AS_Monaco_Basket_Logo.svg.png" class="team-logo">
        </div>

        <h1>PARIS vs MONACO</h1>
        <p class="subtitle">Finale Betclic Élite — Prédictions mises à jour automatiquement</p>

        <div class="header-stats">
            <div class="hstat">
                <div class="hstat-val" id="header-paris-prob">--%</div>
                <div class="hstat-label">Paris</div>
            </div>
            <div class="hstat">
                <div class="hstat-val" id="header-monaco-prob">--%</div>
                <div class="hstat-label">Monaco</div>
            </div>
        </div>
    </div>
</header>

<nav class="tabs">
    <button onclick="showTab('qt')">Évolution QT</button>
    <button onclick="showTab('mc')">Monte-Carlo</button>
    <button onclick="showTab('h2h')">H2H</button>
    <button onclick="showTab('stats')">Stats</button>
</nav>

<main>

<section id="qt" class="tab-section">
    <h2>Évolution des probabilités</h2>
    <canvas id="probChart"></canvas>

    <h3>Détails par QT</h3>
    <div id="before_match"></div>
    <div id="after_q1"></div>
    <div id="after_q2"></div>
    <div id="after_q3"></div>
    <div id="after_q4"></div>
</section>

<section id="mc" class="tab-section hidden">
    <h2>Simulation Monte-Carlo</h2>
    <p>10 000 simulations de fin de match</p>
    <div id="montecarlo"></div>
    <canvas id="mcChart"></canvas>
</section>

<section id="h2h" class="tab-section hidden">
    <h2>Historique des confrontations</h2>
    <div id="h2h-global"></div>
    <div id="h2h-last5"></div>
    <canvas id="h2hChart"></canvas>
</section>

<section id="stats" class="tab-section hidden">
    <h2>Stats avancées</h2>
    <div id="stats-compare"></div>
    <canvas id="statsChart"></canvas>
</section>

</main>

<script>
function showTab(id) {
    document.querySelectorAll(".tab-section").forEach(s => s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
