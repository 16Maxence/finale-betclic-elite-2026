name: Update Predictions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # toutes les 6 heures (modifiable)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip

      - name: Run Monte-Carlo H2H update
        run: |
          python utils/update_predictions.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/predictions.json
          git commit -m "Update Monte-Carlo H2H" || echo "No changes to commit"
          git push
